# Read-through upstream mirrors for BaGetter (multi-mirror fork).
#
# These env vars bind to BaGetterOptions.Mirrors[] — when set, they take precedence
# over the single "Mirror" setting. On a cache miss BaGetter fetches the package from
# the upstream, stores it locally, and serves every later request (and any upstream
# outage) from the local copy.
#
# This file carries the DevExpress feed key (in the PackageSource URL), so it is a
# Secret and MUST NOT be committed with the real key. Create it in-cluster from a
# sealed/external secret or:
#
#   kubectl -n <ns> create secret generic bagetter-mirror \
#     --from-literal=Mirrors__0__Enabled=true \
#     --from-literal=Mirrors__0__Legacy=true \
#     --from-literal=Mirrors__0__PackageSource='https://nuget.devexpress.com/<DEVEXPRESS_FEED_KEY>/api' \
#     --from-literal=Mirrors__0__PackageDownloadTimeoutSeconds=900
#
apiVersion: v1
kind: Secret
metadata:
  name: bagetter-mirror
type: Opaque
stringData:
  # Index 0 — DevExpress (v2 / OData feed: Legacy=true; key is embedded in the URL).
  Mirrors__0__Enabled: "true"
  Mirrors__0__Legacy: "true"
  Mirrors__0__PackageSource: "https://nuget.devexpress.com/<DEVEXPRESS_FEED_KEY>/api"
  Mirrors__0__PackageDownloadTimeoutSeconds: "900"

  # Index 1 — Hangfire Pro (v2 feed; Basic auth).
  Mirrors__1__Enabled: "true"
  Mirrors__1__Legacy: "true"
  Mirrors__1__PackageSource: "https://nuget.hangfire.io/nuget/hangfire-pro/"
  Mirrors__1__Authentication__Type: "Basic"
  Mirrors__1__Authentication__Username: "<HANGFIRE_USER>"
  Mirrors__1__Authentication__Password: "<HANGFIRE_PASSWORD>"

  # Index 2 — Hangfire Ace (v2 feed; Basic auth).
  Mirrors__2__Enabled: "true"
  Mirrors__2__Legacy: "true"
  Mirrors__2__PackageSource: "https://nuget.hangfire.io/nuget/hangfire-ace/"
  Mirrors__2__Authentication__Type: "Basic"
  Mirrors__2__Authentication__Username: "<HANGFIRE_USER>"
  Mirrors__2__Authentication__Password: "<HANGFIRE_PASSWORD>"

  # Optional — also cache nuget.org (insulate builds from nuget.org outages). Only
  # useful if builds route nuget.org restores through this feed.
  # Mirrors__3__Enabled: "true"
  # Mirrors__3__PackageSource: "https://api.nuget.org/v3/index.json"
